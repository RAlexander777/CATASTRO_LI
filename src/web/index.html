<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catastro LI - Ecosistema de Indexación Aprendida</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --text: #333;
        }
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .intro-container {
            background: white; padding: 3rem; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
            max-width: 600px; width: 90%;
        }
        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 2.2rem; }
        .subtitle { color: #7f8c8d; font-size: 1.1rem; margin-bottom: 2rem; }
        
        .db-status-card {
            background: #f4f6f7; border-left: 5px solid var(--accent);
            padding: 1.2rem; border-radius: 6px; margin-bottom: 2.5rem; text-align: left;
        }
        .status-line { margin: 0.5rem 0; font-size: 0.95rem; }
        .badge { 
            background: #2ecc71; color: white; padding: 0.2rem 0.6rem; 
            border-radius: 4px; font-size: 0.8rem; font-weight: bold; 
        }
        
        .btn-enter {
            background: var(--primary); color: white; border: none;
            padding: 0.8rem 2.5rem; font-size: 1.1rem; font-weight: 600;
            border-radius: 6px; cursor: pointer; text-decoration: none;
            transition: all 0.3s ease; display: inline-block;
        }
        .btn-enter:hover { background: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="intro-container">
        <h1>Catastro LI</h1>
        <div class="subtitle">Ecosistema Híbrido de Analítica Espacial y Learned Indexes</div>
        
        <div class="db-status-card">
            <div class="status-line"><strong>Estado del Motor:</strong> <span class="badge">ONLINE</span></div>
            <div class="status-line"><strong>Base de Datos Activa:</strong> <span id="db-name">Cargando...</span></div>
            <div class="status-line"><strong>Esquema Cartográfico:</strong> <code>PostGIS 15 (UTM 19S)</code></div>
            <div class="status-line"><strong>Volumen de Datos Actual:</strong> <span id="db-count">Calculando...</span></div>
        </div>

        <a href="mapa.html" class="btn-enter">Ingresar al Visor Cartográfico</a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
